<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move Tracker - NYC to Israel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --light: #f8f9fa;
            --dark: #2c3e50;
            --gray: #95a5a6;
            --border: #e0e6ed;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            min-height: 100vh;
            padding: 24px;
            color: var(--dark);
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
        }

        /* Header */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
            font-size: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.45);
        }

        /* Split View */
        .split-view {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 40px;
        }

        .split-section {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border);
        }

        .split-header {
            padding: 24px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .split-header-icon {
            font-size: 32px;
        }

        .split-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark);
        }

        .split-header-count {
            margin-left: auto;
            background: var(--light);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: var(--gray);
        }

        .split-body {
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }

        .split-empty {
            text-align: center;
            padding: 60px 30px;
            color: var(--gray);
        }

        .split-empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .split-empty-text {
            font-size: 14px;
            line-height: 1.6;
        }

        /* Task Card */
        .task-card {
            background: white;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .task-card:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        .task-card.completed {
            background: var(--light);
            opacity: 0.7;
        }

        .task-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            margin-top: 3px;
            cursor: pointer;
            accent-color: var(--primary);
            flex-shrink: 0;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
            color: var(--gray);
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-category {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-assigned {
            background: #fff3e0;
            color: #e65100;
        }

        .badge-date {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .task-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .task-link:hover {
            text-decoration: underline;
        }

        /* Subtasks */
        .subtasks-container {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .subtasks-list {
            list-style: none;
            margin-bottom: 10px;
        }

        .subtask-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: var(--light);
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--dark);
        }

        .subtask-item.completed {
            opacity: 0.6;
        }

        .subtask-item input {
            accent-color: var(--primary);
            cursor: pointer;
        }

        .subtask-item.completed .subtask-text {
            text-decoration: line-through;
            color: var(--gray);
        }

        .subtask-text {
            flex: 1;
        }

        .subtask-delete {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
            transition: all 0.3s;
        }

        .subtask-delete:hover {
            transform: scale(1.2);
        }

        .add-subtask-btn {
            background: none;
            border: 1px dashed var(--primary);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .add-subtask-btn:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .add-subtask-form {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .add-subtask-form input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
        }

        .add-subtask-form button {
            padding: 6px 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .task-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-edit {
            background: #e3f2fd;
            color: #1976d2;
        }

        .btn-edit:hover {
            background: #bbdefb;
        }

        .btn-delete {
            background: #ffebee;
            color: var(--danger);
        }

        .btn-delete:hover {
            background: #ffcdd2;
        }

        /* Modal/Form */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--dark);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .btn-secondary {
            flex: 1;
            padding: 12px;
            background: var(--light);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .form-actions .btn-primary {
            flex: 1;
            margin: 0;
            box-shadow: none;
        }

        /* Sidebar Menu */
        .mobile-menu-toggle {
            display: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .sidebar {
            display: none;
        }

        /* Message */
        .message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            animation: slideIn 0.3s ease;
            z-index: 1000;
            display: none;
            font-weight: 600;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: linear-gradient(135deg, var(--success) 0%, #229954 100%);
            color: white;
        }

        .message.error {
            background: linear-gradient(135deg, var(--danger) 0%, #c0392b 100%);
            color: white;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray);
        }

        @media (max-width: 1200px) {
            .split-view {
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .top-bar {
                margin-bottom: 24px;
            }

            .split-view {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .split-body {
                max-height: none;
            }

            .btn-primary {
                padding: 12px 20px;
                font-size: 14px;
            }

            .modal-content {
                padding: 24px;
            }

            .message {
                bottom: 20px;
                right: 20px;
                left: 20px;
                padding: 14px 20px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 20px;
            }

            .btn-primary {
                padding: 10px 16px;
                font-size: 13px;
            }

            .split-header {
                padding: 16px;
            }

            .split-header h2 {
                font-size: 18px;
            }

            .split-body {
                padding: 12px;
            }

            .task-card {
                padding: 14px;
                margin-bottom: 12px;
            }

            .task-title {
                font-size: 14px;
            }

            .modal-content {
                padding: 20px;
                width: 95%;
            }

            .modal-header {
                font-size: 20px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="logo">🌍 Move Tracker</div>
            <div>
                <button class="btn-primary" onclick="showForm()">➕ New Task</button>
            </div>
        </div>

        <!-- Split View -->
        <div class="split-view">
            <!-- NYC Tasks -->
            <div class="split-section">
                <div class="split-header">
                    <div class="split-header-icon">🇺🇸</div>
                    <h2>NYC Tasks</h2>
                    <div class="split-header-count" id="nycCount">0</div>
                </div>
                <div class="split-body" id="nycContainer">
                    <div class="split-empty">
                        <div class="split-empty-icon">📍</div>
                        <div class="split-empty-text">No NYC tasks yet.<br>Create one to get started!</div>
                    </div>
                </div>
            </div>

            <!-- Israel Tasks -->
            <div class="split-section">
                <div class="split-header">
                    <div class="split-header-icon">🇮🇱</div>
                    <h2>Israel Tasks</h2>
                    <div class="split-header-count" id="israelCount">0</div>
                </div>
                <div class="split-body" id="israelContainer">
                    <div class="split-empty">
                        <div class="split-empty-icon">🕯️</div>
                        <div class="split-empty-text">No Israel tasks yet.<br>Create one to get started!</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Task Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">Create New Task</div>
            <form onsubmit="saveTask(event)">
                <div class="form-group">
                    <label>Task Title *</label>
                    <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <select id="taskCategory">
                        <option value="NYC">🇺🇸 NYC</option>
                        <option value="Israel">🇮🇱 Israel</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="taskMission" required>
                        <option value="">Select Category</option>
                        <option value="Housing">🏠 Housing</option>
                        <option value="Financial">💰 Financial</option>
                        <option value="Shopping">🛒 Shopping</option>
                        <option value="Activities">🎯 Activities</option>
                        <option value="Kids">👶 Kids</option>
                        <option value="Logistics">🚚 Logistics</option>
                        <option value="Administrative">📋 Administrative</option>
                        <option value="Medical">⚕️ Medical</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="taskDueDate">
                </div>

                <div class="form-group">
                    <label>Assigned To</label>
                    <select id="taskAssigned">
                        <option value="Me">👤 Me</option>
                        <option value="Wife">👥 Wife</option>
                        <option value="Both">👨‍👩‍👧 Both</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Link (optional)</label>
                    <input type="url" id="taskLink" placeholder="https://example.com">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary" style="margin: 0;">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Subtask Modal -->
    <div class="modal" id="subtaskModal">
        <div class="modal-content">
            <div class="modal-header">Add Subtask</div>
            <form onsubmit="addSubtask(event)">
                <div class="form-group">
                    <label>Subtask Title *</label>
                    <input type="text" id="subtaskTitle" placeholder="What's the next step?" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeSubtaskModal()">Cancel</button>
                    <button type="submit" class="btn-primary" style="margin: 0;">Add Subtask</button>
                </div>
            </form>
        </div>
    </div>

    <div class="message" id="message"></div>

    <script>
        const STORAGE_KEY = 'moveTasks_v3';
        let tasks = [];
        let currentEditId = null;
        let currentParentTaskId = null;

        // Initialize
        window.addEventListener('load', () => {
            loadTasks();
            renderTasks();
        });

        function loadTasks() {
            const saved = localStorage.getItem(STORAGE_KEY);
            tasks = saved ? JSON.parse(saved) : [
                {
                    id: 1,
                    title: "Research moving companies",
                    category: "NYC",
                    completed: false,
                    assigned: "Me",
                    dueDate: "2026-05-20",
                    link: "",
                    mission: "Logistics",
                    subtasks: []
                },
                {
                    id: 2,
                    title: "Organize housing documents",
                    category: "Israel",
                    completed: false,
                    assigned: "Both",
                    dueDate: "2026-05-30",
                    link: "",
                    mission: "Housing",
                    subtasks: []
                },
                {
                    id: 3,
                    title: "Cancel NYC utilities",
                    category: "NYC",
                    completed: false,
                    assigned: "Me",
                    dueDate: "2026-06-15",
                    link: "",
                    mission: "Administrative",
                    subtasks: []
                }
            ];
            saveTasks();
        }

        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        function showForm(taskId = null) {
            if (taskId) {
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    currentEditId = taskId;
                    document.getElementById('taskTitle').value = task.title;
                    document.getElementById('taskCategory').value = task.category;
                    document.getElementById('taskMission').value = task.mission;
                    document.getElementById('taskDueDate').value = task.dueDate;
                    document.getElementById('taskAssigned').value = task.assigned;
                    document.getElementById('taskLink').value = task.link;
                    document.getElementById('modalTitle').textContent = 'Edit Task';
                }
            } else {
                currentEditId = null;
                document.getElementById('taskTitle').value = '';
                document.getElementById('taskCategory').value = 'NYC';
                document.getElementById('taskMission').value = '';
                document.getElementById('taskDueDate').value = '';
                document.getElementById('taskAssigned').value = 'Me';
                document.getElementById('taskLink').value = '';
                document.getElementById('modalTitle').textContent = 'Create New Task';
            }
            document.getElementById('taskModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
            currentEditId = null;
        }

        function saveTask(e) {
            e.preventDefault();
            const title = document.getElementById('taskTitle').value.trim();
            if (!title) {
                showMessage('Please enter a task title', 'error');
                return;
            }

            if (currentEditId) {
                const task = tasks.find(t => t.id === currentEditId);
                if (task) {
                    task.title = title;
                    task.category = document.getElementById('taskCategory').value;
                    task.mission = document.getElementById('taskMission').value;
                    task.dueDate = document.getElementById('taskDueDate').value;
                    task.assigned = document.getElementById('taskAssigned').value;
                    task.link = document.getElementById('taskLink').value;
                    showMessage('Task updated!', 'success');
                }
            } else {
                tasks.push({
                    id: Date.now(),
                    title,
                    category: document.getElementById('taskCategory').value,
                    completed: false,
                    assigned: document.getElementById('taskAssigned').value,
                    dueDate: document.getElementById('taskDueDate').value,
                    link: document.getElementById('taskLink').value,
                    mission: document.getElementById('taskMission').value,
                    subtasks: []
                });
                showMessage('Task created!', 'success');
            }

            saveTasks();
            renderTasks();
            closeModal();
        }

        function deleteTask(id) {
            if (confirm('Delete this task and all its subtasks?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderTasks();
                showMessage('Task deleted', 'success');
            }
        }

        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }

        function showSubtaskForm(taskId) {
            currentParentTaskId = taskId;
            document.getElementById('subtaskTitle').value = '';
            document.getElementById('subtaskModal').classList.add('active');
        }

        function closeSubtaskModal() {
            document.getElementById('subtaskModal').classList.remove('active');
            currentParentTaskId = null;
        }

        function addSubtask(e) {
            e.preventDefault();
            const task = tasks.find(t => t.id === currentParentTaskId);
            if (!task) return;

            const title = document.getElementById('subtaskTitle').value.trim();
            if (!title) return;

            if (!task.subtasks) task.subtasks = [];
            task.subtasks.push({
                id: Date.now(),
                title,
                completed: false
            });

            saveTasks();
            renderTasks();
            closeSubtaskModal();
            showMessage('Subtask added!', 'success');
        }

        function deleteSubtask(taskId, subtaskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.subtasks = task.subtasks.filter(s => s.id !== subtaskId);
                saveTasks();
                renderTasks();
            }
        }

        function toggleSubtask(taskId, subtaskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                const subtask = task.subtasks.find(s => s.id === subtaskId);
                if (subtask) {
                    subtask.completed = !subtask.completed;
                    saveTasks();
                    renderTasks();
                }
            }
        }

        function renderTasks() {
            const nycTasks = tasks.filter(t => t.category === 'NYC');
            const israelTasks = tasks.filter(t => t.category === 'Israel');

            renderContainer('nycContainer', nycTasks, 'nycCount');
            renderContainer('israelContainer', israelTasks, 'israelCount');
        }

        function renderContainer(containerId, tasksToShow, countId) {
            const container = document.getElementById(containerId);
            const countEl = document.getElementById(countId);

            if (tasksToShow.length === 0) {
                container.innerHTML = `
                    <div class="split-empty">
                        <div class="split-empty-icon">✨</div>
                        <div class="split-empty-text">No tasks yet.<br>Create one to get started!</div>
                    </div>
                `;
                countEl.textContent = '0';
                return;
            }

            container.innerHTML = tasksToShow.map(task => `
                <div class="task-card ${task.completed ? 'completed' : ''}">
                    <div class="task-header">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="toggleComplete(${task.id})">
                        <div class="task-content">
                            <div class="task-title">${task.title}</div>
                            <div class="task-meta">
                                <span class="badge badge-category">${task.mission}</span>
                                <span class="badge badge-assigned">${task.assigned === 'Both' ? '👨‍👩‍👧 Both' : task.assigned === 'Me' ? '👤 Me' : '👥 Wife'}</span>
                                ${task.dueDate ? `<span class="badge badge-date">📅 ${new Date(task.dueDate).toLocaleDateString()}</span>` : ''}
                            </div>
                            ${task.link ? `<a href="${task.link}" target="_blank" class="task-link">🔗 View Link</a>` : ''}

                            ${task.subtasks && task.subtasks.length > 0 ? `
                                <div class="subtasks-container">
                                    <ul class="subtasks-list">
                                        ${task.subtasks.map(st => `
                                            <li class="subtask-item ${st.completed ? 'completed' : ''}">
                                                <input type="checkbox" ${st.completed ? 'checked' : ''} onchange="toggleSubtask(${task.id}, ${st.id})">
                                                <span class="subtask-text">${st.title}</span>
                                                <button class="subtask-delete" onclick="deleteSubtask(${task.id}, ${st.id})">✕</button>
                                            </li>
                                        `).join('')}
                                    </ul>
                                    <button class="add-subtask-btn" onclick="showSubtaskForm(${task.id})">+ Add Subtask</button>
                                </div>
                            ` : `<button class="add-subtask-btn" onclick="showSubtaskForm(${task.id})" style="margin-top: 10px;">+ Add Subtask</button>`}
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="btn-small btn-edit" onclick="showForm(${task.id})">✏️ Edit</button>
                        <button class="btn-small btn-delete" onclick="deleteTask(${task.id})">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');

            countEl.textContent = tasksToShow.length;
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message show ${type}`;
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        // Close modal on background click
        document.getElementById('taskModal').addEventListener('click', (e) => {
            if (e.target.id === 'taskModal') closeModal();
        });

        document.getElementById('subtaskModal').addEventListener('click', (e) => {
            if (e.target.id === 'subtaskModal') closeSubtaskModal();
        });
    </script>
</body>
</html>
