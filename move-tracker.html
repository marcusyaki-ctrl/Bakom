<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move Tracker - NYC to Israel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2c3e50;
        }

        .main-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
        }

        /* Sidebar */
        .sidebar {
            background: white;
            border-radius: 16px;
            padding: 30px 20px;
            height: fit-content;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-section {
            margin-bottom: 30px;
        }

        .sidebar-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #95a5a6;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .nav-button {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 2px solid transparent;
            border-radius: 10px;
            background: #f8f9fa;
            color: #2c3e50;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-button:hover {
            background: #ecf0f1;
            transform: translateX(5px);
        }

        .nav-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            font-weight: 500;
        }

        /* Main Content */
        .content {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 32px;
            color: #2c3e50;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
        }

        .btn-secondary:hover {
            background: #dfe6e9;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
        }

        /* Form */
        .form-container {
            background: linear-gradient(135deg, #f5f7fa 0%, #ecf0f1 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 40px;
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .form-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #7f8c8d;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        input, select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Tasks Section */
        .section {
            margin-bottom: 50px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #ecf0f1;
        }

        .section-icon {
            font-size: 32px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            flex: 1;
        }

        .section-count {
            background: #ecf0f1;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: #7f8c8d;
        }

        /* Tasks Grid */
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .task-card {
            background: white;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .task-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .task-card.nyc::before {
            background: #e74c3c;
        }

        .task-card.israel::before {
            background: #3498db;
        }

        .task-card.completed {
            background: #f8f9fa;
            border-color: #bdc3c7;
        }

        .task-card:hover {
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }

        .task-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 15px;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
        }

        .task-title {
            font-size: 16px;
            font-weight: 700;
            color: #2c3e50;
            flex: 1;
            line-height: 1.4;
            word-break: break-word;
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
            color: #95a5a6;
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
            margin-left: 34px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-mission {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-assigned {
            background: #fff3e0;
            color: #e65100;
        }

        .badge-date {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .task-link {
            margin-left: 34px;
            margin-bottom: 12px;
        }

        .task-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .task-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-left: 34px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ecf0f1;
        }

        .task-actions button {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: #95a5a6;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-state-title {
            font-size: 18px;
            font-weight: 700;
            color: #7f8c8d;
            margin-bottom: 8px;
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* Message */
        .message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            animation: slideIn 0.3s ease;
            z-index: 1000;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
        }

        .message.error {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .tasks-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .main-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .mobile-menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                width: 100%;
                margin-bottom: 15px;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                width: 100%;
                max-width: 280px;
                border-radius: 0;
                padding: 20px;
                z-index: 999;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                overflow-y: auto;
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .sidebar::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                display: none;
                z-index: -1;
            }

            .sidebar.mobile-open::before {
                display: block;
            }

            .content {
                padding: 16px;
            }

            .header {
                gap: 10px;
                margin-bottom: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .header-actions {
                width: 100%;
                flex-direction: column;
            }

            .header-actions .btn {
                width: 100%;
                padding: 12px;
                justify-content: center;
            }

            .tasks-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .task-card {
                padding: 16px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-container {
                padding: 20px;
            }

            .form-group label {
                font-size: 11px;
            }

            input, select {
                padding: 14px !important;
                font-size: 16px !important;
            }

            .btn {
                padding: 14px 16px !important;
                font-size: 14px !important;
                min-height: 48px;
            }

            .btn-small {
                padding: 10px 12px !important;
                font-size: 12px !important;
            }

            .task-actions {
                flex-direction: row;
                gap: 8px;
                margin-top: 12px;
            }

            .task-actions button {
                flex: 1;
                padding: 10px !important;
            }

            .stat-box {
                padding: 16px;
                margin-bottom: 8px;
            }

            .stat-number {
                font-size: 24px;
            }

            .section-title {
                font-size: 20px;
            }

            .section-icon {
                font-size: 28px;
            }

            .nav-button {
                padding: 11px 14px;
                font-size: 13px;
                margin-bottom: 6px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
                background: white;
            }

            .content {
                border-radius: 12px;
                padding: 12px;
                box-shadow: none;
            }

            .header {
                margin-bottom: 15px;
            }

            .header h1 {
                font-size: 20px;
                margin-bottom: 10px;
            }

            .header-actions {
                width: 100%;
            }

            .header-actions .btn {
                padding: 12px !important;
                font-size: 12px !important;
            }

            .task-card {
                padding: 14px;
                border-radius: 10px;
            }

            .task-title {
                font-size: 15px;
            }

            .badge {
                padding: 3px 8px;
                font-size: 10px;
            }

            .section-header {
                margin-bottom: 20px;
            }

            .section-title {
                font-size: 18px;
            }

            .section-icon {
                font-size: 24px;
            }

            .section-count {
                padding: 5px 12px;
                font-size: 11px;
            }

            .form-container {
                padding: 16px;
                margin-bottom: 30px;
            }

            .form-title {
                font-size: 18px;
                margin-bottom: 15px;
            }

            input, select {
                font-size: 16px !important;
            }

            .sidebar {
                max-width: 85vw;
            }

            .logo {
                font-size: 20px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">🌍 Move Tracker</div>

            <div class="sidebar-section">
                <div class="sidebar-title">Navigation</div>
                <button class="nav-button active" onclick="showSection('all')">
                    📋 All Tasks
                </button>
                <button class="nav-button" onclick="showSection('nyc')">
                    📍 NYC Tasks
                </button>
                <button class="nav-button" onclick="showSection('israel')">
                    🕯️ Israel Tasks
                </button>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Status</div>
                <button class="nav-button" onclick="filterStatus('all')">
                    📊 All
                </button>
                <button class="nav-button" onclick="filterStatus('active')">
                    ⏳ Active
                </button>
                <button class="nav-button" onclick="filterStatus('completed')">
                    ✅ Completed
                </button>
            </div>

            <div class="sidebar-section">
                <div class="stat-box">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="completedCount">0</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Actions</div>
                <button class="nav-button" onclick="showForm()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    ➕ New Task
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">☰ Menu</button>

            <div class="header">
                <h1 id="pageTitle">All Tasks</h1>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="exportData()">📥 Export</button>
                    <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📤 Import</button>
                    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
                </div>
            </div>

            <!-- Form -->
            <div class="form-container" id="formContainer">
                <div class="form-title" id="formTitle">Create New Task</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Task Title *</label>
                        <input type="text" id="taskTitle" placeholder="e.g., Pack kitchen">
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <select id="taskCategory">
                            <option value="NYC">📍 NYC</option>
                            <option value="Israel">🕯️ Israel</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Mission Type</label>
                        <select id="taskMission">
                            <option value="">Select...</option>
                            <option value="Packing">📦 Packing</option>
                            <option value="Administrative">📋 Administrative</option>
                            <option value="Housing">🏠 Housing</option>
                            <option value="Logistics">🚚 Logistics</option>
                            <option value="Documents">📄 Documents</option>
                            <option value="Financial">💰 Financial</option>
                            <option value="Medical">⚕️ Medical</option>
                            <option value="Pets">🐾 Pets</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" id="taskDueDate">
                    </div>
                    <div class="form-group">
                        <label>Assigned To</label>
                        <select id="taskAssigned">
                            <option value="Me">👤 Yaki</option>
                            <option value="Naama">👥 Naama</option>
                            <option value="Both">👨‍👩‍👧 Both</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Link (optional)</label>
                        <input type="url" id="taskLink" placeholder="https://...">
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn btn-secondary" onclick="hideForm()">Cancel</button>
                    <button class="btn btn-primary" id="submitBtn" onclick="saveTask()">✅ Create Task</button>
                </div>
            </div>

            <!-- All Tasks -->
            <div id="allTasksSection" class="section">
                <div class="section-header">
                    <div class="section-icon">📋</div>
                    <div class="section-title">All Tasks</div>
                    <div class="section-count" id="allCount">0</div>
                </div>
                <div class="tasks-grid" id="allTasksGrid"></div>
            </div>

            <!-- NYC Tasks -->
            <div id="nycSection" class="section" style="display:none;">
                <div class="section-header">
                    <div class="section-icon">📍</div>
                    <div class="section-title">NYC Tasks</div>
                    <div class="section-count" id="nycCount">0</div>
                </div>
                <div class="tasks-grid" id="nycTasksGrid"></div>
            </div>

            <!-- Israel Tasks -->
            <div id="israelSection" class="section" style="display:none;">
                <div class="section-header">
                    <div class="section-icon">🕯️</div>
                    <div class="section-title">Israel Tasks</div>
                    <div class="section-count" id="israelCount">0</div>
                </div>
                <div class="tasks-grid" id="israelTasksGrid"></div>
            </div>
        </main>
    </div>

    <div class="message" id="message"></div>

    <script>
        const STORAGE_KEY = 'moveTasks_v2';
        let tasks = [];
        let currentSection = 'all';
        let currentStatusFilter = 'all';
        let currentEditId = null;

        // Initialize
        window.addEventListener('load', () => {
            loadTasks();
            renderTasks();
            updateStats();
        });

        function loadTasks() {
            const saved = localStorage.getItem(STORAGE_KEY);
            tasks = saved ? JSON.parse(saved) : [
                { id: 1, title: "Get moving quotes", category: "NYC", completed: false, assigned: "Me", dueDate: "2026-05-20", link: "", mission: "Logistics" },
                { id: 2, title: "Start packing non-essentials", category: "NYC", completed: false, assigned: "Both", dueDate: "2026-05-25", link: "", mission: "Packing" },
                { id: 3, title: "Cancel NYC utilities", category: "NYC", completed: false, assigned: "Me", dueDate: "2026-06-15", link: "", mission: "Administrative" },
                { id: 4, title: "Research housing options", category: "Israel", completed: false, assigned: "Both", dueDate: "2026-05-30", link: "", mission: "Housing" },
                { id: 5, title: "Apply for visa/documents", category: "Israel", completed: false, assigned: "Me", dueDate: "2026-06-01", link: "", mission: "Documents" }
            ];
            saveTasks();
        }

        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        function saveTask() {
            const title = document.getElementById('taskTitle').value.trim();
            if (!title) {
                showMessage('Please enter a task title', 'error');
                return;
            }

            if (currentEditId) {
                // Edit existing task
                const task = tasks.find(t => t.id === currentEditId);
                if (task) {
                    task.title = title;
                    task.category = document.getElementById('taskCategory').value;
                    task.assigned = document.getElementById('taskAssigned').value;
                    task.dueDate = document.getElementById('taskDueDate').value;
                    task.link = document.getElementById('taskLink').value;
                    task.mission = document.getElementById('taskMission').value;
                    saveTasks();
                    renderTasks();
                    updateStats();
                    hideForm();
                    showMessage('Task updated successfully!', 'success');
                }
            } else {
                // Create new task
                tasks.push({
                    id: Date.now(),
                    title,
                    category: document.getElementById('taskCategory').value,
                    completed: false,
                    assigned: document.getElementById('taskAssigned').value,
                    dueDate: document.getElementById('taskDueDate').value,
                    link: document.getElementById('taskLink').value,
                    mission: document.getElementById('taskMission').value
                });

                saveTasks();
                renderTasks();
                updateStats();
                hideForm();
                showMessage('Task created successfully!', 'success');
            }
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            currentEditId = id;
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskCategory').value = task.category;
            document.getElementById('taskMission').value = task.mission;
            document.getElementById('taskDueDate').value = task.dueDate;
            document.getElementById('taskAssigned').value = task.assigned;
            document.getElementById('taskLink').value = task.link;
            document.getElementById('formTitle').textContent = 'Edit Task';
            document.getElementById('submitBtn').textContent = '💾 Update Task';
            document.getElementById('formContainer').classList.add('active');
            document.getElementById('formContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function deleteTask(id) {
            if (confirm('Delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderTasks();
                updateStats();
                showMessage('Task deleted', 'success');
            }
        }

        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function showForm() {
            document.getElementById('formContainer').classList.add('active');
        }

        function hideForm() {
            document.getElementById('formContainer').classList.remove('active');
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskCategory').value = 'NYC';
            document.getElementById('taskMission').value = '';
            document.getElementById('taskDueDate').value = '';
            document.getElementById('taskAssigned').value = 'Me';
            document.getElementById('taskLink').value = '';
            document.getElementById('formTitle').textContent = 'Create New Task';
            document.getElementById('submitBtn').textContent = '✅ Create Task';
            currentEditId = null;
        }

        function showSection(section) {
            currentSection = section;
            document.querySelectorAll('.nav-button').forEach((btn, idx) => {
                if (idx < 3) btn.classList.remove('active');
            });
            event.target.classList.add('active');

            document.getElementById('allTasksSection').style.display = 'none';
            document.getElementById('nycSection').style.display = 'none';
            document.getElementById('israelSection').style.display = 'none';

            const titleMap = { all: 'All Tasks', nyc: 'NYC Tasks', israel: 'Israel Tasks' };
            document.getElementById('pageTitle').textContent = titleMap[section];

            if (section === 'all') document.getElementById('allTasksSection').style.display = 'block';
            if (section === 'nyc') document.getElementById('nycSection').style.display = 'block';
            if (section === 'israel') document.getElementById('israelSection').style.display = 'block';

            renderTasks();
        }

        function filterStatus(status) {
            currentStatusFilter = status;
            renderTasks();
        }

        function renderTasks() {
            const filtered = tasks.filter(t => {
                if (currentStatusFilter === 'active') return !t.completed;
                if (currentStatusFilter === 'completed') return t.completed;
                return true;
            });

            const allTasks = filtered;
            const nycTasks = filtered.filter(t => t.category === 'NYC');
            const israelTasks = filtered.filter(t => t.category === 'Israel');

            renderGrid('allTasksGrid', allTasks, 'allCount');
            renderGrid('nycTasksGrid', nycTasks, 'nycCount');
            renderGrid('israelTasksGrid', israelTasks, 'israelCount');
        }

        function renderGrid(gridId, tasksToShow, countId) {
            const grid = document.getElementById(gridId);
            const count = document.getElementById(countId);

            if (tasksToShow.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1;">
                        <div class="empty-state">
                            <div class="empty-state-icon">✨</div>
                            <div class="empty-state-title">No tasks here</div>
                            <div class="empty-state-text">Add a new task to get started</div>
                        </div>
                    </div>
                `;
                count.textContent = '0';
                return;
            }

            grid.innerHTML = tasksToShow.map(task => `
                <div class="task-card ${task.category.toLowerCase()} ${task.completed ? 'completed' : ''}">
                    <div class="task-header">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="toggleComplete(${task.id})">
                        <div class="task-title">${task.title}</div>
                    </div>
                    <div class="task-meta">
                        ${task.mission ? `<span class="badge badge-mission">${task.mission}</span>` : ''}
                        <span class="badge badge-assigned">${task.assigned === 'Both' ? '👨‍👩‍👧 Both' : task.assigned === 'Me' ? '👤 Yaki' : '👥 Naama'}</span>
                        ${task.dueDate ? `<span class="badge badge-date">📅 ${new Date(task.dueDate).toLocaleDateString()}</span>` : ''}
                    </div>
                    ${task.link ? `<div class="task-link"><a href="${task.link}" target="_blank">🔗 View Link</a></div>` : ''}
                    <div class="task-actions">
                        <button class="btn btn-secondary btn-small" onclick="editTask(${task.id})">✏️ Edit</button>
                        <button class="btn btn-danger btn-small" onclick="deleteTask(${task.id})">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');

            count.textContent = tasksToShow.length;
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
        }

        function exportData() {
            const data = {
                exportedAt: new Date().toISOString(),
                tasks: tasks
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `move-tasks-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showMessage('Tasks exported!', 'success');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.tasks && Array.isArray(data.tasks)) {
                        tasks = data.tasks;
                        saveTasks();
                        renderTasks();
                        updateStats();
                        showMessage('Tasks imported!', 'success');
                    }
                } catch (error) {
                    showMessage('Error importing file', 'error');
                }
            };
            reader.readAsText(file);
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message show ${type}`;
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        function toggleMobileMenu() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // Close mobile menu when clicking on a nav button
        document.addEventListener('DOMContentLoaded', () => {
            const navButtons = document.querySelectorAll('.nav-button');
            navButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (window.innerWidth <= 768) {
                        const sidebar = document.querySelector('.sidebar');
                        sidebar.classList.remove('mobile-open');
                    }
                });
            });
        });
    </script>
</body>
</html>
