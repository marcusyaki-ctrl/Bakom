<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC → Israel Move Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 8px;
            font-size: 0.9em;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95em;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-button {
            padding: 8px 16px;
            background: #f0f0f0;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .form-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        input, select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .section-title {
            font-size: 1.8em;
            color: white;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-title .icon {
            font-size: 1.5em;
        }

        .tasks-container {
            display: grid;
            gap: 15px;
        }

        .task-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
            transition: all 0.3s;
            display: grid;
            grid-template-columns: 30px 1fr auto;
            gap: 15px;
            align-items: start;
        }

        .task-card.completed {
            opacity: 0.6;
            background: #f5f5f5;
        }

        .task-card.nyc {
            border-left-color: #f56565;
        }

        .task-card.israel {
            border-left-color: #4299e1;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            margin-top: 2px;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
            color: #999;
        }

        .task-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .tag-category {
            background: #fee;
            color: #c33;
        }

        .tag-category.israel {
            background: #def;
            color: #038;
        }

        .tag-mission {
            background: #efe;
            color: #3a3;
        }

        .tag-assigned {
            background: #fef3c7;
            color: #92400e;
        }

        .tag-due {
            background: #f3e8ff;
            color: #6b21a8;
        }

        .task-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9em;
            display: inline-block;
            margin-top: 8px;
        }

        .task-link:hover {
            text-decoration: underline;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            flex-direction: column;
        }

        .task-actions button {
            padding: 6px 12px;
            font-size: 0.85em;
            white-space: nowrap;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        .sync-status {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .sync-status.show {
            display: block;
        }

        .sync-status.success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #48bb78;
        }

        .sync-status.error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #f56565;
        }

        footer {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            color: #666;
            margin-top: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .task-card {
                grid-template-columns: 30px 1fr;
            }

            .task-actions {
                grid-column: 1 / -1;
                flex-direction: row;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🌍 NYC → Israel Move Tracker</h1>
            <p class="subtitle">Organize your move together - Yaki & Naama</p>
        </header>

        <!-- Stats -->
        <div class="stats-grid" id="statsContainer"></div>

        <!-- Controls -->
        <div class="controls">
            <div class="button-group">
                <button class="btn-primary" onclick="showForm()">➕ Add New Task</button>
                <button class="btn-success" onclick="exportData()">📥 Export Tasks</button>
                <button class="btn-success" onclick="document.getElementById('importFile').click()">📤 Import Tasks</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
                <button class="btn-secondary" onclick="clearCompleted()">🗑️ Clear Completed</button>
            </div>

            <div id="syncStatus" class="sync-status"></div>

            <!-- Filters -->
            <div class="filter-tabs">
                <button class="tab-button active" onclick="filterTasks('all')">All Tasks</button>
                <button class="tab-button" onclick="filterTasks('active')">⏳ Active</button>
                <button class="tab-button" onclick="filterTasks('completed')">✅ Completed</button>
                <button class="tab-button" onclick="filterTasks('nyc')">📍 NYC Only</button>
                <button class="tab-button" onclick="filterTasks('israel')">🕯️ Israel Only</button>
            </div>
        </div>

        <!-- Form -->
        <div class="form-section" id="formSection">
            <h3>Add New Task</h3>
            <div class="form-grid">
                <div>
                    <label>Task Title *</label>
                    <input type="text" id="taskTitle" placeholder="e.g., Pack kitchen boxes">
                </div>
                <div>
                    <label>Location</label>
                    <select id="taskCategory">
                        <option value="NYC">📍 NYC</option>
                        <option value="Israel">🕯️ Israel</option>
                    </select>
                </div>
                <div>
                    <label>Mission Type</label>
                    <select id="taskMission">
                        <option value="">Select...</option>
                        <option value="Packing">📦 Packing</option>
                        <option value="Administrative">📋 Administrative</option>
                        <option value="Housing">🏠 Housing</option>
                        <option value="Logistics">🚚 Logistics</option>
                        <option value="Documents">📄 Documents</option>
                        <option value="Financial">💰 Financial</option>
                        <option value="Medical">⚕️ Medical</option>
                        <option value="Pets">🐾 Pets</option>
                        <option value="School/Work">🎓 School/Work</option>
                        <option value="Social">👥 Social</option>
                    </select>
                </div>
                <div>
                    <label>Due Date</label>
                    <input type="date" id="taskDueDate">
                </div>
                <div>
                    <label>Assigned To</label>
                    <select id="taskAssigned">
                        <option value="Me">👤 Yaki</option>
                        <option value="Wife">👥 Naama</option>
                        <option value="Both">👨‍👩‍👧 Both</option>
                    </select>
                </div>
                <div>
                    <label>Link (optional)</label>
                    <input type="url" id="taskLink" placeholder="https://...">
                </div>
            </div>
            <div class="form-buttons">
                <button class="btn-primary" onclick="addTask()">✅ Add Task</button>
                <button class="btn-secondary" onclick="cancelForm()">Cancel</button>
            </div>
        </div>

        <!-- NYC Tasks -->
        <div class="section-title">
            <span class="icon">📍</span>
            NYC Tasks
            <span style="color: #ddd; font-size: 0.7em; margin-left: auto;">(<span id="nycCount">0</span>)</span>
        </div>
        <div class="tasks-container" id="nycTasks"></div>

        <!-- Israel Tasks -->
        <div class="section-title">
            <span class="icon">🕯️</span>
            Israel Tasks
            <span style="color: #ddd; font-size: 0.7em; margin-left: auto;">(<span id="israelCount">0</span>)</span>
        </div>
        <div class="tasks-container" id="israelTasks"></div>

        <!-- Footer -->
        <footer>
            <p>💡 Tip: Refresh this page to see updates. Share this link with Naama to collaborate!</p>
        </footer>
    </div>

    <script>
        const STORAGE_KEY = 'moveTasks';
        let tasks = [];
        let currentFilter = 'all';

        // Initialize
        function init() {
            loadTasks();
            renderTasks();
            updateStats();
        }

        // Load tasks from localStorage
        function loadTasks() {
            const saved = localStorage.getItem(STORAGE_KEY);
            tasks = saved ? JSON.parse(saved) : getInitialTasks();
            saveTasks();
        }

        // Get initial sample tasks
        function getInitialTasks() {
            return [
                { id: 1, title: "Get moving quotes", category: "NYC", completed: false, assigned: "Me", dueDate: "2026-05-20", link: "", mission: "Logistics" },
                { id: 2, title: "Start packing non-essentials", category: "NYC", completed: false, assigned: "Both", dueDate: "2026-05-25", link: "", mission: "Packing" },
                { id: 3, title: "Cancel NYC utilities", category: "NYC", completed: false, assigned: "Me", dueDate: "2026-06-15", link: "", mission: "Administrative" },
                { id: 4, title: "Research housing options", category: "Israel", completed: false, assigned: "Both", dueDate: "2026-05-30", link: "", mission: "Housing" },
                { id: 5, title: "Apply for visa/entry documents", category: "Israel", completed: false, assigned: "Me", dueDate: "2026-06-01", link: "", mission: "Documents" }
            ];
        }

        // Save tasks to localStorage
        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        // Add task
        function addTask() {
            const title = document.getElementById('taskTitle').value.trim();
            if (!title) {
                alert('Please enter a task title');
                return;
            }

            const task = {
                id: Date.now(),
                title: title,
                category: document.getElementById('taskCategory').value,
                completed: false,
                assigned: document.getElementById('taskAssigned').value,
                dueDate: document.getElementById('taskDueDate').value,
                link: document.getElementById('taskLink').value,
                mission: document.getElementById('taskMission').value
            };

            tasks.push(task);
            saveTasks();
            renderTasks();
            updateStats();
            cancelForm();
            showSyncStatus('✅ Task added successfully!', 'success');
        }

        // Delete task
        function deleteTask(id) {
            if (confirm('Delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        // Toggle complete
        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        // Clear completed tasks
        function clearCompleted() {
            if (confirm('Delete all completed tasks?')) {
                tasks = tasks.filter(t => !t.completed);
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        // Filter tasks
        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTasks();
        }

        // Render tasks
        function renderTasks() {
            const nycContainer = document.getElementById('nycTasks');
            const israelContainer = document.getElementById('israelTasks');

            nycContainer.innerHTML = '';
            israelContainer.innerHTML = '';

            const filtered = tasks.filter(t => {
                if (currentFilter === 'active') return !t.completed;
                if (currentFilter === 'completed') return t.completed;
                if (currentFilter === 'nyc') return t.category === 'NYC';
                if (currentFilter === 'israel') return t.category === 'Israel';
                return true;
            });

            const nycTasks = filtered.filter(t => t.category === 'NYC');
            const israelTasks = filtered.filter(t => t.category === 'Israel');

            if (nycTasks.length === 0) {
                nycContainer.innerHTML = '<div class="empty-state">✨ All NYC tasks complete!</div>';
            } else {
                nycTasks.forEach(task => nycContainer.appendChild(createTaskElement(task)));
            }

            if (israelTasks.length === 0) {
                israelContainer.innerHTML = '<div class="empty-state">✨ All Israel tasks complete!</div>';
            } else {
                israelTasks.forEach(task => israelContainer.appendChild(createTaskElement(task)));
            }

            document.getElementById('nycCount').textContent = nycTasks.length;
            document.getElementById('israelCount').textContent = israelTasks.length;
        }

        // Create task element
        function createTaskElement(task) {
            const div = document.createElement('div');
            div.className = `task-card ${task.category.toLowerCase()} ${task.completed ? 'completed' : ''}`;

            div.innerHTML = `
                <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="toggleComplete(${task.id})">
                <div class="task-content">
                    <div class="task-title">${task.title}</div>
                    <div class="task-tags">
                        <span class="tag tag-category ${task.category.toLowerCase()}">${task.category === 'NYC' ? '📍 NYC' : '🕯️ Israel'}</span>
                        ${task.mission ? `<span class="tag tag-mission">${task.mission}</span>` : ''}
                        <span class="tag tag-assigned">${task.assigned === 'Both' ? '👨‍👩‍👧 Both' : task.assigned === 'Me' ? '👤 Yaki' : '👥 Naama'}</span>
                        ${task.dueDate ? `<span class="tag tag-due">📅 ${new Date(task.dueDate).toLocaleDateString()}</span>` : ''}
                    </div>
                    ${task.link ? `<a href="${task.link}" target="_blank" class="task-link">🔗 View Link</a>` : ''}
                </div>
                <div class="task-actions">
                    <button class="btn-secondary" onclick="deleteTask(${task.id})">🗑️</button>
                </div>
            `;

            return div;
        }

        // Show/hide form
        function showForm() {
            document.getElementById('formSection').classList.add('active');
        }

        function cancelForm() {
            document.getElementById('formSection').classList.remove('active');
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskCategory').value = 'NYC';
            document.getElementById('taskMission').value = '';
            document.getElementById('taskDueDate').value = '';
            document.getElementById('taskAssigned').value = 'Me';
            document.getElementById('taskLink').value = '';
        }

        // Export data
        function exportData() {
            const data = {
                exportedAt: new Date().toISOString(),
                exportedBy: 'Move Tracker',
                tasks: tasks
            };

            const dataStr = JSON.stringify(data, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `move-tasks-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
            showSyncStatus('✅ Tasks exported!', 'success');
        }

        // Import data
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.tasks && Array.isArray(data.tasks)) {
                        tasks = data.tasks;
                        saveTasks();
                        renderTasks();
                        updateStats();
                        showSyncStatus('✅ Tasks imported successfully!', 'success');
                    }
                } catch (error) {
                    showSyncStatus('❌ Error importing file', 'error');
                }
            };
            reader.readAsText(file);
        }

        // Update stats
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const active = total - completed;
            const nycCount = tasks.filter(t => t.category === 'NYC').length;
            const israelCount = tasks.filter(t => t.category === 'Israel').length;

            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${completed}</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${active}</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${nycCount}</div>
                    <div class="stat-label">NYC Tasks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${israelCount}</div>
                    <div class="stat-label">Israel Tasks</div>
                </div>
            `;
        }

        // Show sync status
        function showSyncStatus(message, type) {
            const el = document.getElementById('syncStatus');
            el.className = `sync-status show ${type}`;
            el.textContent = message;
            setTimeout(() => {
                el.classList.remove('show');
            }, 3000);
        }

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
